spring:
  application:
    name: 'backend'

  datasource:
    url: ${SUPABASE_URL}
    username: ${SUPABASE_USER}
    password: ${SUPABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

api:
  football:
    base-url: ${FOOTBALL_API_URL}
    api-key: ${FOOTBALL_API_KEY}
    whitelisted-ids: 1,2,3,39,61,78,135,140,94,88
    daily-call-limit: 100

sync:
  scheduler:
    enabled: true

scoring:
  winner-points: 1
  exact-score-points: 2
  scorer-points: 3
  assister-points: 3

competition:
  sync:
    cron: '0 0 0 1 * *' # Every first in the month

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token:
    expiration: 900000       # 15 minutes
  refresh-token:
    expiration: 604800000    # 7 days

cookie:
  domain: ${COOKIE_DOMAIN:localhost}
  secure: ${COOKIE_SECURE:false}
  same-site: ${COOKIE_SAME_SITE:Lax}
